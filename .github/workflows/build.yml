name: build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake --preset vs2022-release

      - name: Build
        run: cmake --build --preset build-release

      - name: Prepare artifact
        shell: pwsh
        run: New-Item -ItemType Directory -Path artifacts -Force | Out-Null; Copy-Item build/vs2022-release/Release/Antivirus.exe artifacts/Antivirus.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Antivirus-exe
          path: artifacts/Antivirus.exe